<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate of Participation</title>
</head>
<body>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .certificate {
    border-radius: 20px;
    background: white;
    padding: 60px;
    width: 750px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .header { font-size: 36px; color: #667eea; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
  .sub { font-size: 16px; color: #888; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
  .name { font-size: 38px; color: #333; margin-bottom: 30px; font-weight: 300; }
  .reason { font-size: 18px; color: #555; line-height: 1.8; margin-bottom: 40px; }
  .footer { display: flex; justify-content: space-between; margin-top: 40px; font-size: 14px; color: #999; }
  .signature { border-top: 2px solid #667eea; width: 200px; padding-top: 10px; margin-top: 10px; }
  .lasu-logo { width: 60px; height: 60px; margin-bottom: 10px; object-fit: contain; }
  .lasu-seal { font-size: 12px; color: #1B5E20; margin-top: 15px; font-weight: bold; letter-spacing: 1px; }
</style><div class="certificate">
  <div class="header">Certificate of Participation</div>
  <div class="sub">Proudly Awarded To</div>
  <div class="name">Idowu Fawaz Olawunmi</div>
  <div class="reason">
    For outstanding performance in<br>
    <strong style="font-size: 22px; color: #667eea;">CSC 226 Object Oriented Programming</strong><br><br>
    Grade Achieved: <strong>B</strong>
  </div>
  <img class="lasu-logo" src="../assets/lasu.png" alt="LASU">
  <div class="lasu-seal">Lagos State University &mdash; Department of Computer Science</div>
  <div class="footer">
    <div>July 2026</div>
    <div class="signature">Department Coordinator</div>
  </div>
</div>
</body>
</html>
