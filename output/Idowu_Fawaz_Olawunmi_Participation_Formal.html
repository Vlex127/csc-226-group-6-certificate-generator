<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate of Participation</title>
</head>
<body>

<style>
  body {
    font-family: 'Georgia', serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .certificate {
    border: 10px double #1a365d;
    background: white;
    padding: 50px;
    width: 700px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
  }
  .header { font-size: 42px; color: #1a365d; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }
  .sub { font-size: 18px; color: #555; font-style: italic; margin-bottom: 40px; }
  .name { font-size: 32px; color: #2c5282; border-bottom: 2px solid #2c5282; display: inline-block; padding: 0 20px; margin-bottom: 20px; }
  .reason { font-size: 20px; color: #333; line-height: 1.6; margin-bottom: 50px; }
  .footer { display: flex; justify-content: space-between; margin-top: 50px; font-size: 16px; color: #666; }
  .signature { border-top: 1px solid #aaa; width: 200px; padding-top: 5px; }
  .lasu-logo { width: 48px; height: 48px; margin-bottom: 6px; object-fit: contain; }
  .lasu-seal { font-size: 14px; color: #1B5E20; margin-top: 10px; font-weight: bold; letter-spacing: 1px; }
</style><div class="certificate">
  <div class="header">Certificate of Participation</div>
  <div class="sub">This honor is proudly presented to</div>
  <div class="name">Idowu Fawaz Olawunmi</div>
  <div class="reason">for successfully completing the course <br><strong>CSC 226 Object Oriented Programming</strong><br> with a grade of <strong>B</strong>.</div>
  <img class="lasu-logo" src="../assets/lasu.png" alt="LASU">
  <div class="lasu-seal">Lagos State University &mdash; Department of Computer Science</div>
  <div class="footer">
    <div>Date: July 2026</div>
    <div class="signature">Department Coordinator</div>
  </div>
</div>
</body>
</html>
